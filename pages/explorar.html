<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="../assets/img/Petal-logo-bege.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/explorar.css" />
    <title>Explorar • Petal</title>

  <body>
    <header>
      <nav>
        <a href="home.html">Home</a>

        <img src="../assets/img/Petal-nome-bege.png" alt="Petal" class="logo-text" />

    </header>

    <img src="../assets/img/folhas-dir.png" alt="" class="folhas-direita" />
    <img src="../assets/img/folhas-esq.png" alt="" class="folhas-esquerda" />

      <div class="feed-posts" id="feedPosts">
        <p class="feed-loading">Carregando publicações...</p>
